<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OI viewer</title>
  <style>
    /* ================================================
       全域
    ================================================ */
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #242836;
      --border:    #2e3347;
      --accent:    #5e6ad2;
      --accent2:   #7c5ce0;
      --text:      #c8cce0;
      --text-dim:  #6b7084;
      --green:     #3ecf8e;
      --red:       #f07178;
      --yellow:    #ffe066;
      --strike-bg: #2d3154;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ================================================
       Header
    ================================================ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    header h1 span { color: var(--accent); }

    .controls {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #oi-controls .controls {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .ctrl-group label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    select, input, button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    select:hover, button:hover {
      border-color: var(--accent);
      background: #2a2d3e;
    }

    select option { background: var(--surface2); }

    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 6px;
      min-width: 160px;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); background: #2a2d3e; }

    button.btn-load {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 7px 20px;
    }

    button.btn-load:hover { background: #4f5fc2; border-color: #4f5fc2; }

    #info {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* product type badge */
    #product-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    #product-badge.so { background: rgba(62,207,142,0.2); color: var(--green); }
    #product-badge.io { background: rgba(96,165,250,0.2); color: #60a5fa; }

    /* ================================================
       表格區（凍結窗格：header固定，body可 scroll）
    ================================================ */
    .table-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 160px);
      padding: 16px 24px 40px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1400px;
      font-size: 12px;
    }

    thead th {
      background: var(--surface);
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
      text-align: center;
      user-select: none;
    }

    thead th.strike-col {
      background: var(--strike-bg);
      color: var(--yellow);
      border-color: #4a4f7a;
      font-size: 12px;
    }

    tbody tr:nth-child(odd)  { background: var(--bg); }
    tbody tr:nth-child(even) { background: var(--surface); }
    tbody tr:hover { background: #252836; }

    tbody td {
      padding: 5px 8px;
      border: 1px solid var(--border);
      white-space: nowrap;
      text-align: right;
    }

    tbody td:first-child { text-align: left; }

    tbody td.strike-col {
      background: var(--strike-bg) !important;
      color: var(--yellow);
      font-weight: 700;
      font-size: 13px;
    }

    /* 數值 */
    .val-pos  { color: var(--green); }
    .val-neg  { color: var(--red); }
    .val-zero { color: var(--text-dim); }

    /* 左邊界 highlight → 整行變色（文字變黃，背景各自顏色） */
    .hl-call-deals   { background: rgba(62,207,142,0.18) !important; color: #ffe066 !important; }
    .hl-put-deals    { background: rgba(96,165,250,0.18) !important; color: #ffe066 !important; }
    .hl-call-gross   { background: rgba(251,146,60,0.18)  !important; color: #ffe066 !important; }
    .hl-put-gross    { background: rgba(192,132,252,0.18) !important; color: #ffe066 !important; }

    /* 同一行有多個 highlight（同時滿足多個條件） */
    .hl-call-deals.hl-call-gross  { background: rgba(251,211,77,0.22) !important; color: #ffe066 !important; }
    .hl-put-deals.hl-put-gross    { background: rgba(167,139,250,0.22) !important; color: #ffe066 !important; }

    /* Top-3 格子：黃色粗體，紅色背景 */
    .top-cell { background-color: var(--red) !important; color: #ffe066 !important; font-weight: 700 !important; }

    /* ================================================
       狀態訊息
    ================================================ */
    #status {
      padding: 14px 24px;
      font-size: 13px;
      color: var(--text-dim);
    }
    #status.loading { color: var(--accent); }
    #status.error   { color: var(--red); }
    #status.ok      { color: var(--green); }

    /* ================================================
       Scrollbar
    ================================================ */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ================================================
       Tab
    ================================================ */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-left: 0;
    }
    .tab-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 18px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ================================================
       Empty state
    ================================================ */
    .empty-msg {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ================================================
       IF section
    ================================================ */
    #if-section { display: none; }
    #if-section.active { display: block; }
    #oi-section { display: block; }
    #oi-section.hidden { display: none; }
    #scan-section { display: none; }
    #scan-section.active { display: block; }

    .if-controls {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .date-range-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
  </style>
</head>
<body>

<!-- ================================================
     Header 控制列
================================================ -->
<header>
  <h1>📊 <span>OI</span> Viewer</h1>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-oi" onclick="switchTab('oi')">📈 OI 期權</button>
    <button class="tab-btn" id="tab-if" onclick="switchTab('if')">📊 IF 期貨</button>
    <button class="tab-btn" id="tab-scan" onclick="switchTab('scan')">🔍 篩選</button>
  </div>

  <div class="controls" id="oi-controls" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">

    <!-- 產品代碼（textbox + datalist 自動建議） -->
    <div class="ctrl-group">
      <label>產品</label>
      <input type="text" id="code-input" placeholder="HSI / 00700 …" list="product-datalist" autocomplete="off" />
      <datalist id="product-datalist">
        {% for p in products %}
        <option value="{{ p.code }}" data-type="{{ p.type }}" data-label="{{ p.label }}">
          {{ p.label }} [{{ p.type }}]
        </option>
        {% endfor %}
      </datalist>
    </div>

    <!-- 日期 -->
    <div class="ctrl-group">
      <label>日期</label>
      <select id="date-select" disabled>
        <option value="">— 先輸入代碼 —</option>
      </select>
    </div>

    <!-- 月份 -->
    <div class="ctrl-group">
      <label>月份</label>
      <select id="month-select">
        <option value="">全部</option>
        {% for m in month_abbr_list %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- 年份 -->
    <div class="ctrl-group">
      <label>年份</label>
      <select id="year-select">
        <option value="">全部</option>
        {% for y in year_list %}
        <option value="{{ y }}">{{ y }}</option>
        {% endfor %}
      </select>
    </div>

    <button class="btn-load" id="btn-load">🔍 載入</button>
  </div>

  <div id="product-badge" class="io">—</div>
  <div id="info"></div>

  <!-- 股價面板（SO 專用）-->
  <div id="sp-panel" style="display:none; margin-left:auto; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:12px; min-width:200px;">
    <div style="color:var(--text-dim); font-size:10px; margin-bottom:4px;">📈 <span id="sp-label">—</span></div>
    <div style="display:flex; gap:16px; align-items:center;">
      <div style="text-align:center;">
        <div style="font-size:10px;color:var(--text-dim)">開</div>
        <div id="sp-open" style="font-size:15px;font-weight:700;color:var(--text)">—</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:10px;color:var(--text-dim)">高</div>
        <div id="sp-high" style="font-size:15px;font-weight:700;color:var(--green)">—</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:10px;color:var(--text-dim)">低</div>
        <div id="sp-low" style="font-size:15px;font-weight:700;color:var(--red)">—</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:10px;color:var(--text-dim)">收</div>
        <div id="sp-close" style="font-size:18px;font-weight:700;color:#fff">—</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:10px;color:var(--text-dim)">成交量</div>
        <div id="sp-vol" style="font-size:11px;color:var(--text-dim)">—</div>
      </div>
    </div>
  </div>
  <!-- IF 期貨控制面板 -->
  <div id="if-section">
    <div class="controls" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">

      <!-- 指數 -->
      <div class="ctrl-group">
        <label>指數</label>
        <select id="if-index-select">
          <option value="">— 請選擇 —</option>
        </select>
      </div>

      <!-- 月份 -->
      <div class="ctrl-group">
        <label>月份</label>
        <select id="if-month-select">
          <option value="">全部</option>
          {% for m in month_abbr_list %}
          <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- 年份 -->
      <div class="ctrl-group">
        <label>年份</label>
        <select id="if-year-select">
          <option value="">全部</option>
          {% for y in year_list %}
          <option value="{{ y }}">{{ y }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- 日期範圍 -->
      <div class="ctrl-group">
        <label>開始日期</label>
        <input type="date" id="if-date-from" />
      </div>
      <div class="ctrl-group">
        <label>結束日期</label>
        <input type="date" id="if-date-to" />
      </div>

      <button class="btn-load" id="btn-load-if">🔍 載入</button>
    </div>
  </div>

</header>

<!-- ================================================
     狀態列
================================================ -->
<div id="status">💡 輸入產品代碼、選擇日期，再點「載入」</div>

<!-- ================================================
     表格
================================================ -->
<div class="table-wrap" id="table-wrap" style="display:none">
  <table id="so-table">
    <thead id="table-head"></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- IF 期貨表格 -->
<div class="table-wrap" id="if-table-wrap" style="display:none">
  <table id="if-table">
    <thead id="if-table-head"></thead>
    <tbody id="if-table-body"></tbody>
  </table>
</div>

<!-- Scan 篩選控制面板 -->
<div id="scan-section" class="controls" style="display:none;flex-wrap:wrap;gap:10px;align-items:flex-end;">

  <!-- 日期範圍 -->
  <div class="ctrl-group">
    <label>由日期</label>
    <input type="date" id="scan-date-from" />
  </div>
  <div class="ctrl-group">
    <label>至日期</label>
    <input type="date" id="scan-date-to" />
  </div>

  <!-- 合約月份範圍起點 -->
  <div class="ctrl-group">
    <label>月份起點</label>
    <select id="scan-month-start">
      <option value="">—</option>
      {% for m in month_abbr_list %}
      <option value="{{ m }}">{{ m }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="ctrl-group">
    <label>年份起點</label>
    <select id="scan-year-start">
      <option value="">—</option>
      {% for y in year_list %}
      <option value="{{ y }}">{{ y }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- 合約月份範圍終點 -->
  <div class="ctrl-group">
    <label>月份終點</label>
    <select id="scan-month-end">
      <option value="">—</option>
      {% for m in month_abbr_list %}
      <option value="{{ m }}">{{ m }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="ctrl-group">
    <label>年份終點</label>
    <select id="scan-year-end">
      <option value="">—</option>
      {% for y in year_list %}
      <option value="{{ y }}">{{ y }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- 淨數變化閾值 -->
  <div class="ctrl-group">
    <label>淨數變化 ≥</label>
    <input type="number" id="scan-threshold" value="1000" min="0" style="width:80px;" />
  </div>

  <!-- 方向 -->
  <div class="ctrl-group">
    <label>方向</label>
    <select id="scan-side">
      <option value="both">全部</option>
      <option value="call">Call</option>
      <option value="put">Put</option>
    </select>
  </div>

  <button class="btn-load" id="btn-load-scan">🔍 篩選</button>
</div>

<!-- Scan 表格 -->
<div class="table-wrap" id="scan-table-wrap" style="display:none">
  <table id="scan-table">
    <thead id="scan-table-head"></thead>
    <tbody id="scan-table-body"></tbody>
  </table>
</div>

<!-- ================================================
     JavaScript
================================================ -->
<script>
  const codeInput  = document.getElementById('code-input');
  const dateSel    = document.getElementById('date-select');
  const monthSel   = document.getElementById('month-select');
  const yearSel    = document.getElementById('year-select');
  const btnLoad    = document.getElementById('btn-load');
  const infoEl     = document.getElementById('info');
  const badgeEl    = document.getElementById('product-badge');
  const statusEl   = document.getElementById('status');
  const tableWrap  = document.getElementById('table-wrap');
  const theadEl    = document.getElementById('table-head');
  const tbodyEl    = document.getElementById('table-body');

  // 中文欄位名（由後端傳入）
  const COL_CN = {{ col_names | tojson }};

  // 當前選中的產品
  let currentCode = '';
  let currentType = '';  // 'SO' | 'IO'

  // ── 更新 product badge ──────────────────────────
  function updateBadge(type) {
    if (type === 'SO') {
      badgeEl.textContent = 'SO 股票期權';
      badgeEl.className = 'so';
    } else if (type === 'IO') {
      badgeEl.textContent = 'IO 指數期權';
      badgeEl.className = 'io';
    } else {
      badgeEl.textContent = '—';
      badgeEl.className = '';
    }
  }

  // ── 選了產品 → 載入日期 + 自動 Load ────────────
  async function onCodeSelected(code) {
    if (!code) return;
    currentCode = code;

    // 從 datalist 找 type
    const allOptions = document.querySelectorAll('#product-datalist option');
    let matchedType = '';
    allOptions.forEach(opt => {
      if (opt.value === code) matchedType = opt.dataset.type;
    });
    currentType = matchedType;
    updateBadge(matchedType);

    dateSel.innerHTML = '<option value="">載入中…</option>';
    dateSel.disabled = true;

    try {
      const res  = await fetch(`/api/dates?code=${encodeURIComponent(code)}`);
      const data = await res.json();

      if (data.error) {
        dateSel.innerHTML = '<option value="">找不到日期</option>';
        setStatus('❌ ' + data.error, 'error');
        return;
      }

      dateSel.innerHTML = '<option value="">— 請選擇日期 —</option>';
      data.dates.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = data.display[i] + (i === 0 ? ' ◀ 最新' : '');
        if (i === 0) opt.selected = true;
        dateSel.appendChild(opt);
      });
      dateSel.disabled = false;

      // 自動設定當月/年份
      const curMonth = {{ current_month | tojson }};
      const curYear  = {{ current_year  | tojson }};
      if (monthSel.querySelector(`option[value="${curMonth}"]`)) monthSel.value = curMonth;
      if (yearSel.querySelector(`option[value="${curYear}"]`))  yearSel.value = curYear;

      // 自動載入
      loadData();
    } catch (e) {
      dateSel.innerHTML = '<option value="">載入失敗</option>';
      setStatus('❌ 網路錯誤：' + e.message, 'error');
    }
  }

  // ── code textbox：輸入後嘗試自動匹配 ──────────
  // iOS Safari：input + blur 雙事件
  function tryMatchCode(inputVal) {
    const val = inputVal.trim().toUpperCase();
    if (!val) return;
    const allOptions = document.querySelectorAll('#product-datalist option');
    let matched = null;
    allOptions.forEach(opt => {
      if (opt.value.toUpperCase() === val) matched = opt.value;
    });
    if (matched) {
      codeInput.value = matched;
      onCodeSelected(matched);
    }
  }

  codeInput.addEventListener('input', () => {
    tryMatchCode(codeInput.value);
  });

  codeInput.addEventListener('blur', () => {
    tryMatchCode(codeInput.value);
  });

  // ── 載入按鈕 ────────────────────────────────────
  btnLoad.addEventListener('click', loadData);

  // 日期切換 → 自動重新載入（SO/IS 需更新現貨面板）
  dateSel.addEventListener('change', loadData);

  async function loadData() {
    const code    = codeInput.value.trim();
    const dateStr = dateSel.value;

    if (!code || !dateStr) {
      setStatus('⚠️ 請先輸入產品代碼及選擇日期', 'error');
      return;
    }

    setStatus('⏳ 載入中…', 'loading');

    try {
      const params = new URLSearchParams({
        code: code,
        date: dateStr,
        month_abbr: monthSel.value,
        year: yearSel.value,
      });
      const res  = await fetch(`/api/data?${params.toString()}`);
      const data = await res.json();

      if (data.error) { setStatus('❌ ' + data.error, 'error'); return; }

      renderTable(data);
      const filterStr = [monthSel.value || '', yearSel.value || ''].filter(Boolean).join(' / ');
      const typeLabel = data.type === 'SO' ? 'SO' : 'IO';
      infoEl.textContent = `${data.code} [${typeLabel}] ｜ ${data.date_display} ｜ ${data.total_rows} 行${filterStr ? ' ｜ 篩選: ' + filterStr : ''}`;
      setStatus(`✅ 顯示 ${data.total_rows} 行`, 'ok');

      // SO 股票 → 顯示現貨；IO 指數 → 期貨現貨（MHI/MCH 唔顯示）
      // 注意：HSI/HHI 月期貨在 Yahoo Finance 已 delist，改用 ^HSI / ^HSCE 現貨代替
      const ioNoSp = ['MHI', 'MCH'].includes(code);
      if (data.type === 'SO' || (data.type === 'IO' && !ioNoSp)) {
        loadSPPrice(code, dateStr);
      } else {
        document.getElementById('sp-panel').style.display = 'none';
      }
    } catch (e) {
      setStatus('❌ 載入失敗：' + e.message, 'error');
    }
  }

  // ── 渲染表格 ────────────────────────────────────
  function renderTable(data) {
    const STRIKE_COLS = new Set(['strike']);
    const CHANGE_COLS = new Set([
      'call_price_change', 'put_price_change',
      'call_turnover_change', 'put_turnover_change',
      'call_net_change', 'put_net_change',
      'call_gross_change', 'put_gross_change',
    ]);
    const RATIO_COLS  = new Set(['call_ratio', 'put_ratio']);

    const getTopVals = (rows, colIdx) => {
      const vals = rows.map(r => parseFloat(r[colIdx]) || 0);
      const sorted = [...new Set(vals)].sort((a, b) => b - a);
      return new Set(sorted.slice(0, 3));
    };

    // 所有要 Top-3 highlight 的欄位
    const TOP_COLS = [
      'call_turnover_prev', 'call_turnover', 'call_net_change', 'call_net',
      'call_gross_prev',    'call_gross',
      'put_gross',          'put_gross_prev',
      'put_net_change',     'put_net',
      'put_turnover',      'put_turnover_prev',
      'put_ratio',
    ];
    const topVals = {};
    TOP_COLS.forEach(col => {
      const idx = data.columns.indexOf(col);
      if (idx >= 0) topVals[col] = getTopVals(data.rows, idx);
    });

    theadEl.innerHTML = '';
    const tr = document.createElement('tr');
    data.columns.forEach(col => {
      if (COL_CN[col] === null || COL_CN[col] === undefined) return;
      const th = document.createElement('th');
      th.textContent = COL_CN[col] || col;
      if (STRIKE_COLS.has(col)) th.classList.add('strike-col');
      tr.appendChild(th);
    });
    theadEl.appendChild(tr);

    tbodyEl.innerHTML = '';
    if (data.rows.length === 0) {
      tbodyEl.innerHTML = '<tr><td colspan="99" style="text-align:center;color:var(--text-dim);padding:40px">🔍 沒有找到符合篩選條件的資料</td></tr>';
      tableWrap.style.display = 'block';
      return;
    }

    data.rows.forEach((row) => {
      const tr = document.createElement('tr');
      data.columns.forEach((col, i) => {
        if (COL_CN[col] === null || COL_CN[col] === undefined) return;
        const td = document.createElement('td');
        let val = row[i];

        const numVal = parseFloat(val) || 0;
        if (TOP_COLS.includes(col) && topVals[col].has(numVal)) td.classList.add('top-cell');

        if (val === '' || val === null || val === undefined ||
            (typeof val === 'number' && isNaN(val))) {
          td.textContent = '—';
        } else {
          if (typeof val === 'number' && !RATIO_COLS.has(col)) {
            if (Number.isInteger(val)) {
              td.textContent = val.toLocaleString('en-US');
            } else {
              td.textContent = val.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2,
              });
            }
            if (CHANGE_COLS.has(col)) {
              if (val > 0)      td.classList.add('val-pos');
              else if (val < 0) td.classList.add('val-neg');
              else              td.classList.add('val-zero');
            }
          } else {
            td.textContent = val;
          }
        }

        if (STRIKE_COLS.has(col)) td.classList.add('strike-col');
        tr.appendChild(td);
      });
      tbodyEl.appendChild(tr);
    });

    tableWrap.style.display = 'block';
    statusEl.textContent = '';
  }

  // ── 載入股票現貨價面板 ─────────────────────────────
  // SO 股票：直接用 code（如 0700）
  // IO 指數：HSI/HHI → ^HSI / ^HSCE 現貨；HTI → HSTECH.HK 現貨；MHI/MCH → 唔顯示
  async function loadSPPrice(code, dateStr) {
    const panel = document.getElementById('sp-panel');

    // 判斷是否 IO 指數（用於 skip 或 label）
    const ioCodes = ['HSI', 'HHI', 'HTI', 'MHI', 'MCH'];
    const isIO = ioCodes.includes(code);
    const ioSkip = ['MHI', 'MCH'].includes(code);

    if (ioSkip) { panel.style.display = 'none'; return; }

    try {
      const res = await fetch(`/api/sp?code=${encodeURIComponent(code)}&date=${encodeURIComponent(dateStr)}`);
      const sp = await res.json();

      if (sp.error) {
        panel.style.display = 'none';
        return;
      }

      const fmt = (v) => {
        if (!v && v !== 0) return '—';
        const f = parseFloat(v);
        if (isNaN(f)) return '—';
        return f.toFixed(2);
      };
      const fmtVol = (v) => {
        if (!v) return '—';
        const f = parseFloat(v);
        if (isNaN(f)) return '—';
        if (f >= 1e6) return (f / 1e6).toFixed(1) + 'M';
        if (f >= 1e3) return (f / 1e3).toFixed(0) + 'K';
        return f.toString();
      };

      document.getElementById('sp-label').textContent = isIO ? `${code} 現貨` : `${code} 現貨`;
      document.getElementById('sp-open').textContent  = fmt(sp.open);
      document.getElementById('sp-high').textContent  = fmt(sp.high);
      document.getElementById('sp-low').textContent   = fmt(sp.low);
      document.getElementById('sp-close').textContent = fmt(sp.close);
      document.getElementById('sp-vol').textContent   = fmtVol(sp.volume);

      panel.style.display = 'flex';
    } catch (e) {
      panel.style.display = 'none';
    }
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = cls || '';
  }

  // ── 預設：HSI + 自動載入 ────────────────────────
  codeInput.value = 'HSI';
  onCodeSelected('HSI');

  // ── IF Tab JavaScript ──────────────────────────────
  let currentIFCode = '';

  function switchTab(tab) {
    const tabOI = document.getElementById('tab-oi');
    const tabIF = document.getElementById('tab-if');
    const oiSection = document.getElementById('oi-controls');
    const ifSection = document.getElementById('if-section');
    const ifTableWrap = document.getElementById('if-table-wrap');
    const oiTableWrap = document.getElementById('table-wrap');
    const statusEl = document.getElementById('status');

    if (tab === 'if') {
      tabOI.classList.remove('active');
      tabIF.classList.add('active');
      document.getElementById('tab-scan').classList.remove('active');
      oiSection.style.display = 'none';
      ifSection.classList.add('active');
      oiTableWrap.style.display = 'none';
      initIFTab();
    } else if (tab === 'scan') {
      tabOI.classList.remove('active');
      tabIF.classList.remove('active');
      document.getElementById('tab-scan').classList.add('active');
      oiSection.style.display = 'none';
      ifSection.classList.remove('active');
      oiTableWrap.style.display = 'none';
      document.getElementById('if-table-wrap').style.display = 'none';
      document.getElementById('scan-section').style.display = 'flex';
      // 預設日期範圍
      const now = new Date();
      const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 3, now.getDate());
      document.getElementById('scan-date-from').value = threeMonthsAgo.toISOString().split('T')[0];
      document.getElementById('scan-date-to').value    = now.toISOString().split('T')[0];
      setStatus('💡 設定條件後點「篩選」', '');
    } else {
      tabIF.classList.remove('active');
      document.getElementById('tab-scan').classList.remove('active');
      tabOI.classList.add('active');
      oiSection.style.display = '';
      ifSection.classList.remove('active');
      document.getElementById('scan-section').style.display = 'none';
      ifTableWrap.style.display = 'none';
      statusEl.textContent = '💡 輸入產品代碼、選擇日期，再點「載入」';
    }
  }

  async function initIFTab() {
    const sel = document.getElementById('if-index-select');
    sel.innerHTML = '<option value="">載入中…</option>';

    try {
      const res = await fetch('/api/if/products');
      const data = await res.json();

      sel.innerHTML = '<option value="">— 請選擇 —</option>';
      data.forEach(idx => {
        const opt = document.createElement('option');
        opt.value = idx.code;
        opt.textContent = idx.label;
        sel.appendChild(opt);
      });

      // 預設 HSI
      sel.value = 'HSI';
      if (sel.value === 'HSI') {
        onIFIndexSelected('HSI');
      }
    } catch (e) {
      sel.innerHTML = '<option value="">載入失敗</option>';
    }
  }

  async function onIFIndexSelected(code) {
    if (!code) return;
    currentIFCode = code;

    // 設定預設月份（當月）和年份（今年）
    const now = new Date();
    const curMonthIdx = now.getMonth(); // 0-11
    const curMonthAbbr = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][curMonthIdx];
    const curYear = String(now.getFullYear()).slice(-2); // 26

    document.getElementById('if-month-select').value = curMonthAbbr;
    document.getElementById('if-year-select').value = curYear;

    // 設定預設日期範圍
    const today = now.toISOString().split('T')[0];
    const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 3, now.getDate()).toISOString().split('T')[0];
    document.getElementById('if-date-from').value = threeMonthsAgo;
    document.getElementById('if-date-to').value = today;

    // 自動載入
    loadIFData();
  }

  document.getElementById('if-index-select').addEventListener('change', (e) => {
    onIFIndexSelected(e.target.value);
  });

  document.getElementById('btn-load-if').addEventListener('click', loadIFData);

  async function loadIFData() {
    const code = document.getElementById('if-index-select').value;
    const monthSel = document.getElementById('if-month-select').value;
    const yearSel = document.getElementById('if-year-select').value;
    const dateFrom = document.getElementById('if-date-from').value.replace(/-/g, '');
    const dateTo = document.getElementById('if-date-to').value.replace(/-/g, '');

    if (!code) {
      document.getElementById('status').textContent = '⚠️ 請選擇指數';
      return;
    }

    setStatus('⏳ 載入中…', 'loading');

    try {
      const params = new URLSearchParams({ code });
      if (monthSel) params.set('months', monthSel);
      if (yearSel) params.set('year', yearSel);
      if (dateFrom) params.set('date_from', dateFrom);
      if (dateTo) params.set('date_to', dateTo);

      const res = await fetch(`/api/if/data?${params.toString()}`);
      const data = await res.json();

      if (data.error) {
        setStatus('❌ ' + data.error, 'error');
        return;
      }

      renderIFTable(data);
      document.getElementById('info').textContent = `${data.code} [IF] ｜ ${data.date_range} ｜ ${data.total_rows} 行`;
      setStatus(`✅ 顯示 ${data.total_rows} 行`, 'ok');
    } catch (e) {
      setStatus('❌ 載入失敗：' + e.message, 'error');
    }
  }

  const IF_COL_CN = {
    "date_display": "日期",
    "month_label": "合約日期",
    "gross": "未平倉合約",
    "gross_change": "未平倉合約增減",
    "net": "淨倉",
    "net_change": "淨倉增減",
    "rise_fall": "升跌",
    "settle_price": "結算價",
    "turnover": "成交量",
    "deals_ratio": "成交比例",
    "deals": "成交筆數",
  };

  function renderIFTable(data) {
    const theadEl = document.getElementById('if-table-head');
    const tbodyEl = document.getElementById('if-table-body');
    const tableWrap = document.getElementById('if-table-wrap');

    const displayCols = ["date_display", "month_label", "gross", "gross_change", "net", "net_change", "rise_fall", "settle_price", "turnover", "deals_ratio", "deals"];
    const colKeys = displayCols;

    // Top-3 highlight columns
    const getTopVals = (rows, colIdx) => {
      const vals = rows.map(r => parseFloat(r[colIdx]) || 0);
      const sorted = [...new Set(vals)].sort((a, b) => b - a);
      return new Set(sorted.slice(0, 3));
    };

    const netIdx          = data.columns.indexOf('net');
    const netChangeIdx    = data.columns.indexOf('net_change');
    const turnoverIdx     = data.columns.indexOf('turnover');
    const dealsRatioIdx   = data.columns.indexOf('deals_ratio');

    const topNet         = getTopVals(data.rows, netIdx);
    const topNetChange   = getTopVals(data.rows, netChangeIdx);
    const topTurnover    = getTopVals(data.rows, turnoverIdx);
    const topDealsRatio  = getTopVals(data.rows, dealsRatioIdx);

    theadEl.innerHTML = '';
    const tr = document.createElement('tr');

    colKeys.forEach(col => {
      const th = document.createElement('th');
      th.textContent = IF_COL_CN[col] || col;
      tr.appendChild(th);
    });
    theadEl.appendChild(tr);

    tbodyEl.innerHTML = '';
    if (data.rows.length === 0) {
      tbodyEl.innerHTML = '<tr><td colspan="99" style="text-align:center;color:var(--text-dim);padding:40px">🔍 沒有找到符合條件的資料</td></tr>';
      tableWrap.style.display = 'block';
      return;
    }

    data.rows.forEach((row) => {
      const tr = document.createElement('tr');
      colKeys.forEach((col, i) => {
        const td = document.createElement('td');
        const colIdx = data.columns.indexOf(col);
        let val = colIdx >= 0 ? row[colIdx] : '';

        const numVal = parseFloat(val);

        // Top-3 red highlight
        if (col === 'net'          && topNet.has(numVal))         td.classList.add('top-cell');
        if (col === 'net_change'   && topNetChange.has(numVal))    td.classList.add('top-cell');
        if (col === 'turnover'     && topTurnover.has(numVal))      td.classList.add('top-cell');
        if (col === 'deals_ratio'  && topDealsRatio.has(numVal))   td.classList.add('top-cell');

        if (col === 'rise_fall' && !isNaN(numVal)) {
          if (numVal > 0) td.classList.add('val-pos');
          else if (numVal < 0) td.classList.add('val-neg');
          else td.classList.add('val-zero');
        }

        if (val === '' || val === null || val === undefined) {
          td.textContent = '—';
        } else if (!isNaN(numVal) && col !== 'date_display' && col !== 'month_label') {
          if (Number.isInteger(numVal)) {
            td.textContent = numVal.toLocaleString('en-US');
          } else {
            td.textContent = numVal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          }
        } else {
          td.textContent = val;
        }

        tr.appendChild(td);
      });
      tbodyEl.appendChild(tr);
    });

    tableWrap.style.display = 'block';
    document.getElementById('status').textContent = '';
  }

  // ── Scan Tab ───────────────────────────────────────
  document.getElementById('btn-load-scan').addEventListener('click', loadScanData);

  async function loadScanData() {
    const dateFrom = document.getElementById('scan-date-from').value.replace(/-/g, '');
    const dateTo   = document.getElementById('scan-date-to').value.replace(/-/g, '');
    const monthStart = document.getElementById('scan-month-start').value;
    const yearStart  = document.getElementById('scan-year-start').value;
    const monthEnd   = document.getElementById('scan-month-end').value;
    const yearEnd    = document.getElementById('scan-year-end').value;
    const threshold  = document.getElementById('scan-threshold').value;
    const side       = document.getElementById('scan-side').value;

    if (!dateFrom || !dateTo) {
      setStatus('⚠️ 需要日期範圍', 'error');
      return;
    }

    setStatus('⏳ 掃描中（需時數秒）…', 'loading');

    try {
      const params = new URLSearchParams({ date_from: dateFrom, date_to: dateTo, threshold, side });
      if (monthStart) params.set('month_start', monthStart);
      if (yearStart)  params.set('year_start', yearStart);
      if (monthEnd)   params.set('month_end', monthEnd);
      if (yearEnd)    params.set('year_end', yearEnd);

      const res = await fetch(`/api/scan?${params.toString()}`);
      const data = await res.json();

      if (data.error) { setStatus('❌ ' + data.error, 'error'); return; }

      renderScanTable(data);
      const f = data.filters;
      setStatus(
        `✅ 找到 ${data.total_rows} 行 ｜ 掃描 ${f.total_dates_scanned} 個交易日 ｜ ` +
        `閾值≥${f.threshold} ｜ ${f.month_range} ｜ ${f.side}`,
        'ok'
      );
    } catch (e) {
      setStatus('❌ 載入失敗：' + e.message, 'error');
    }
  }

  function renderScanTable(data) {
    const theadEl = document.getElementById('scan-table-head');
    const tbodyEl = document.getElementById('scan-table-body');
    const tableWrap = document.getElementById('scan-table-wrap');

    theadEl.innerHTML = '';
    const tr = document.createElement('tr');
    (data.col_names_cn ? Object.entries(data.col_names_cn) : data.columns.map(c => [c, c])).forEach(([col, label]) => {
      const th = document.createElement('th');
      th.textContent = label;
      tr.appendChild(th);
    });
    theadEl.appendChild(tr);

    tbodyEl.innerHTML = '';
    if (data.rows.length === 0) {
      tbodyEl.innerHTML = '<tr><td colspan="99" style="text-align:center;color:var(--text-dim);padding:40px">🔍 沒有找到符合條件的資料</td></tr>';
      tableWrap.style.display = 'block';
      return;
    }

    const colCount = data.columns.length;
    data.rows.forEach((row) => {
      const tr = document.createElement('tr');
      row.forEach((val, i) => {
        const td = document.createElement('td');
        const numVal = parseFloat(val);
        if (val === '' || val === null || val === undefined) {
          td.textContent = '—';
        } else if (!isNaN(numVal)) {
          td.textContent = numVal.toLocaleString('en-US');
          if (numVal > 0) td.classList.add('val-pos');
          else if (numVal < 0) td.classList.add('val-neg');
        } else {
          td.textContent = val;
        }
        tr.appendChild(td);
      });
      tbodyEl.appendChild(tr);
    });

    tableWrap.style.display = 'block';
  }
</script>
