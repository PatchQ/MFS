<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent 對話</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user {
      align-self: flex-end;
      background: #238636;
      color: white;
    }
    .ai {
      align-self: flex-start;
      background: #30363d;
    }
    .cmd {
      align-self: flex-start;
      background: #21262d;
      border-left: 4px solid #f0b849;
      font-family: 'Consolas', monospace;
      color: #f0b849;
    }
    #input-area {
      padding: 12px 16px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
    }
    #message {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117;
      color: inherit;
      font-size: 16px;
    }
    #send {
      margin-left: 8px;
      padding: 0 20px;
      background: #238636;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    #send:hover { background: #2ea043; }
  </style>
</head>
<body>

  <div id="chat"></div>

  <div id="input-area">
    <input id="message" placeholder="輸入訊息..." autocomplete="off" autofocus />
    <button id="send">送出</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('message');
    const sendBtn = document.getElementById('send');

    function addMessage(type, content) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';
      input.disabled = true;
      sendBtn.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })  // 注意：後端用的是 "mesage"（少個 s）
        });

        if (!res.ok) throw new Error('請求失敗');

        const { steps } = await res.json();

        for (const step of steps) {
          if (step.type === 'ai') {
            addMessage('ai', step.content);
          } else if (step.type === 'cmd') {
            addMessage('cmd', step.content);
          }
        }
      } catch (err) {
        addMessage('ai', `錯誤：${err.message}`);
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.onclick = sendMessage;

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
